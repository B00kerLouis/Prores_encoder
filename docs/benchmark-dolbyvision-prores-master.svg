<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Dolby Vision ProRes master benchmark</title>
  <desc id="desc">Realtime speed comparison for ProRes Dolby Vision master exports. Resolve ProRes output is marked as HDR10 only because no Dolby Vision metadata was present.</desc>
  <rect width="980" height="430" fill="#f7f8fb"/>
  <text x="42" y="54" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Dolby Vision ProRes Master Benchmark</text>
  <text x="42" y="82" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4b5563">3840x2160 / 24p, 93.08 s source. Realtime speed factor; higher is faster.</text>

  <line x1="280" y1="112" x2="280" y2="342" stroke="#d1d5db" stroke-width="1"/>
  <line x1="280" y1="342" x2="840" y2="342" stroke="#d1d5db" stroke-width="1"/>

  <text x="42" y="147" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">ProRes Encoder</text>
  <rect x="280" y="124" width="520" height="34" rx="4" fill="#2563eb"/>
  <text x="814" y="147" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#111827">7.03x</text>
  <text x="280" y="178" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">13.24 s, ProRes 4444 XQ MOV, Dolby Vision metadata verified</text>

  <text x="42" y="225" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">DaVinci Resolve 20.3.1</text>
  <rect x="280" y="202" width="50" height="34" rx="4" fill="#9ca3af"/>
  <text x="344" y="225" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#111827">0.68x</text>
  <text x="280" y="256" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">137.82 s, ProRes 422 HQ MOV; HDR10 metadata only, no Dolby Vision metadata found</text>

  <text x="42" y="303" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Mezzinator 5.6.2</text>
  <rect x="280" y="280" width="19" height="34" rx="4" fill="#f97316"/>
  <text x="313" y="303" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#111827">0.26x</text>
  <text x="280" y="334" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">364.02 s, ProRes 4444 XQ MOV, SMPTE ST 2086 / Dolby Vision metadata verified</text>

  <text x="42" y="386" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">Note: Resolve's measured ProRes result is shown for speed context only; it did not produce a valid embedded Dolby Vision ProRes master in this test.</text>
</svg>
